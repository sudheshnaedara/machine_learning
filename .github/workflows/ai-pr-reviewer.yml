name: Vertex AI PR Reviewer

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Get PR Diff
        id: diff
        run: |
          git diff origin/${{ github.base_ref }} HEAD > pr_diff.txt
          echo "DIFF_PATH=pr_diff.txt" >> $GITHUB_ENV

      - name: Call Vertex AI Agent
        id: agent
        run: |
          # CONFIGURATION
          DATA_STORE_ID="1775696248774"
          PROJECT_ID="ai-code-reviewer-492601"
          
          # We use v1alpha and the :answer endpoint for Data Stores
          RESPONSE=$(curl -s -X POST \
            -H "Authorization: Bearer $(gcloud auth print-access-token)" \
            -H "Content-Type: application/json" \
            "https://googleapis.com" \
            -d "{
              \"query\": { \"text\": \"Review this Python code diff against our style guide and provide brief feedback: $(cat pr_diff.txt | python3 -c 'import json,sys; print(json.dumps(sys.stdin.read()))')\" }
            }")
          
          echo "DEBUG_LOG: $RESPONSE"
          
          # Extract the text and save to file
          echo "$RESPONSE" | jq -r '.answer.answerText // "AI Review: Code looks consistent with standards."' > ai_review.txt

      - name: Post Comment to PR
        uses: mshick/add-pr-comment@v2
        with:
          message-path: ai_review.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
