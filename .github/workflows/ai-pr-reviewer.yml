name: Vertex AI PR Reviewer

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write # Required to post comments

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Get PR Diff
        id: diff
        run: |
          # Get the changes between the PR branch and the main branch
          git diff origin/${{ github.base_ref }} HEAD > pr_diff.txt
          echo "DIFF_PATH=pr_diff.txt" >> $GITHUB_ENV

      - name: Call Vertex AI Agent
        id: agent
        run: |
          DATA_STORE_ID="1775696248774"
          PROJECT_ID="ai-code-reviewer-492601"
          
          # We use 'v1alpha' and 'answer' for direct Data Store queries
          RESPONSE=$(curl -s -X POST \
            -H "Authorization: Bearer $(gcloud auth print-access-token)" \
            -H "Content-Type: application/json" \
            "https://googleapis.com" \
            -d "{
              \"query\": { \"text\": \"Review this Python code diff: $(cat pr_diff.txt | python3 -c 'import json,sys; print(json.dumps(sys.stdin.read()))')\" }
            }")
          
          echo "Debug Response: $RESPONSE"
          # Data Store API uses 'answerText' inside the 'answer' object
          echo "$RESPONSE" | jq -r '.answer.answerText // "Review completed, check logs for details."' > ai_review.txt


      - name: Post Comment to PR
        uses: mshick/add-pr-comment@v2
        with:
          message-path: ai_review.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
